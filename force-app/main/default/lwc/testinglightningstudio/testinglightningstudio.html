<template>
    <lightning-card title="Create Account" icon-name="standard:account">
        <div class="slds-p-around_medium">
            <lightning-record-edit-form 
                object-api-name="Account"
                onsuccess={handleSuccess}>

                <!-- Required Fields -->
                <lightning-input-field field-name="Name" required></lightning-input-field>
                <lightning-input-field field-name="Phone" required></lightning-input-field>
                <lightning-input-field field-name="Industry" required></lightning-input-field>

                <!-- Optional Fields -->
                <lightning-input-field field-name="Type"></lightning-input-field>
                <lightning-input-field field-name="Website"></lightning-input-field>
                <lightning-input-field field-name="AnnualRevenue"></lightning-input-field>
                <lightning-input-field field-name="NumberOfEmployees"></lightning-input-field>
                <lightning-input-field field-name="BillingCity"></lightning-input-field>
                <lightning-input-field field-name="BillingCountry"></lightning-input-field>
                <lightning-input-field field-name="Description"></lightning-input-field>

                <!-- Buttons -->
                <div class="slds-m-top_medium">
                    <lightning-button 
                        variant="brand"
                        type="submit"
                        label="Save">
                    </lightning-button>
                </div>

            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
