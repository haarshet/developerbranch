<template>
    <lightning-card title="Render Multiple template" icon-name="custom:custom14">
        <div class="slds-m-around_medium">
            <h2 class="slds-text-heading_medium slds-m-bottom_medium">Choose your option</h2>
            <lightning-button 
            variant="destructive"
            title="signup"
            label="signup"
            onclick={handleClick}
            class="slds-m-left_x-small">
            </lightning-button>
            <lightning-button 
            variant="success"
            title="signin"
            label="signin"
            onclick={handleClick}
            class="slds-m-left_x-small">
            </lightning-button>
        </div>

    </lightning-card>
    
</template>
